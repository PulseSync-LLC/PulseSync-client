name: Build Application (Dev)

on:
  push:
    branches:
      - dev

concurrency:
  group: build-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 50

      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          list-files: shell
          filters: |
            build:
              - 'src/**'
              - 'static/**'
              - 'icons/**'
              - 'nativeModules/**'
              - 'scripts/**'
              - 'scriptsInstaller/**'
              - 'package.json'
              - 'yarn.lock'
              - '.yarnrc.yml'
              - 'forge.config.ts'
              - 'vite.main.config.ts'
              - 'vite.preload.config.ts'
              - 'vite.renderer.config.ts'
              - 'electron-builder.yml'
              - 'tsconfig*.json'
              - 'Info.plist'
              - 'graphql.config.yml'
              - 'schema.graphql'
              - '.github/workflows/build-dev-windows.yml'

      - name: Report changed build-related files
        shell: bash
        run: |
          echo "should_build=${{ steps.filter.outputs.build }}"
          if [ "${{ steps.filter.outputs.build }}" = "true" ]; then
            echo "Changed build-related files:"
            printf '%s\n' ${{ steps.filter.outputs.build_files }}
          else
            echo "No build-related changes detected"
          fi

  build:
    needs: changes
    if: ${{ needs.changes.outputs.should_build == 'true' }}
    runs-on: ${{ matrix.os }}
    environment: BUILD_PRODUCTION
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: '**/yarn.lock'

      - uses: actions/cache@v5
        with:
          path: |
            nativeModules/**/node_modules
            nativeModules/**/build
          key: native-modules-${{ runner.os }}-${{ runner.arch }}-node22-${{ hashFiles('nativeModules/**/package.json', 'nativeModules/**/yarn.lock', 'nativeModules/**/binding.gyp', 'nativeModules/**/*.c', 'nativeModules/**/*.cc', 'nativeModules/**/*.cpp', 'nativeModules/**/*.h', 'nativeModules/**/*.hpp') }}

      - name: Create .env
        shell: bash
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > .env
          fi

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Compute dev version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(node -p "require('./package.json').version.split('-')[0]")"
          DEV_VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
          echo "build_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using BUILD_VERSION=$DEV_VERSION"

      - name: Build and publish dev
        run: yarn build:package --nativeModules --publish dev
        env:
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          S3_KEEP_RECENT_VERSIONS: 3

      - name: Show release contents
        shell: bash
        run: |
          if [ -d release ]; then
            echo "release/ files:"
            find release -maxdepth 2 -type f | sort
          else
            echo "release/ not found"; exit 1
          fi

  skip-build:
    needs: changes
    if: ${{ needs.changes.outputs.should_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip dev build
        run: echo "Skipping dev build because no app or build files changed."
