name: Build Application (Dev)

on:
  push:
    branches:
      - dev

concurrency:
  group: build-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    environment: BUILD_PRODUCTION
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, macos-15-intel]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: '**/yarn.lock'

      - uses: actions/cache@v5
        with:
          path: |
            nativeModules/**/node_modules
            nativeModules/**/build
          key: native-modules-${{ runner.os }}-${{ runner.arch }}-node22-${{ hashFiles('nativeModules/**/package.json', 'nativeModules/**/yarn.lock', 'nativeModules/**/binding.gyp', 'nativeModules/**/*.c', 'nativeModules/**/*.cc', 'nativeModules/**/*.cpp', 'nativeModules/**/*.h', 'nativeModules/**/*.hpp') }}

      - name: Create .env
        shell: bash
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > .env
          fi

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Compute dev version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(node -p "require('./package.json').version.split('-')[0]")"
          DEV_VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
          echo "build_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using BUILD_VERSION=$DEV_VERSION"

      - name: Build and publish dev
        run: yarn build:package --nativeModules ${{ startsWith(matrix.os, 'macos-') && runner.arch == 'X64' && '--mac-x64' || '' }} --publish dev
        env:
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          S3_KEEP_RECENT_VERSIONS: 3

      - name: Show release contents
        shell: bash
        run: |
          if [ -d release ]; then
            echo "release/ files:"
            find release -maxdepth 2 -type f | sort
          else
            echo "release/ not found"; exit 1
          fi
