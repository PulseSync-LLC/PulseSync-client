name: Build Application (Release)

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    environment: BUILD_PRODUCTION
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-26, macos-26-intel]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: '**/yarn.lock'

      - uses: actions/cache@v5
        with:
          path: |
            nativeModules/**/node_modules
            nativeModules/**/build
          key: native-modules-${{ runner.os }}-${{ runner.arch }}-node22-${{ hashFiles('nativeModules/**/package.json', 'nativeModules/**/yarn.lock', 'nativeModules/**/binding.gyp', 'nativeModules/**/*.c', 'nativeModules/**/*.cc', 'nativeModules/**/*.cpp', 'nativeModules/**/*.h', 'nativeModules/**/*.hpp') }}

      - name: Create .env
        shell: bash
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > .env
          fi

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build (package)
        run: yarn build:package --nativeModules ${{ startsWith(matrix.os, 'macos-') && runner.arch == 'X64' && '--mac-x64' || '' }}
        env:
          BUILD_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          PUBLISH_BRANCH_FROM_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

      - name: Show release contents (debug)
        shell: bash
        run: |
          if [ -d release ]; then
            echo "release/ files:"
            find release -maxdepth 2 -type f | sort
          else
            echo "release/ not found"; exit 1
          fi

      - name: Upload release artifacts for GitHub Release
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: release/**/*
          if-no-files-found: error

      - name: Publish changelog (single-run on ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' && !contains(github.ref_name, 'dev') }}
        shell: bash
        run: |
          VERSION_ARGS=()
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            VERSION_ARGS=(--version "${{ github.ref_name }}")
          fi

          yarn publish:api "${VERSION_ARGS[@]}"
          yarn publish:discord "${VERSION_ARGS[@]}"

  github_release:
    name: Create GitHub Release
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: github-release-artifacts

      - name: Prepare GitHub Release assets
        shell: bash
        run: |
          mkdir -p github-release-assets
          declare -A NAME_COUNT=()

          while IFS= read -r -d '' file; do
            base_name="$(basename "$file")"
            artifact_dir="$(printf '%s' "$file" | sed -E 's#^github-release-artifacts/([^/]+)/.*#\1#')"
            target_name="$base_name"
            name_count="${NAME_COUNT[$base_name]:-0}"

            if (( name_count > 0 )); then
              target_name="${artifact_dir}-${name_count}-${base_name}"
            fi

            NAME_COUNT["$base_name"]=$((name_count + 1))
            cp "$file" "github-release-assets/$target_name"
          done < <(find github-release-artifacts -type f -print0 | sort -z)

          find github-release-assets -maxdepth 1 -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            github-release-assets/*

  publish_aur:
    name: Publish AUR Package
    needs: [build, github_release]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment: BUILD_PRODUCTION

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Prepare AUR SSH key
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "AUR_SSH_PRIVATE_KEY secret is not configured"
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur_archlinux"
          chmod 600 "$HOME/.ssh/aur_archlinux"
          ssh-keyscan aur.archlinux.org >> "$HOME/.ssh/known_hosts"

      - name: Update AUR packaging files
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          asset_version="${TAG_NAME#v}"
          pkgver="${asset_version%%-*}"
          prerelease="${asset_version#"$pkgver"}"
          prerelease="${prerelease#-}"
          branch="${prerelease%%.*}"

          if [ -z "$branch" ] || [ "$branch" = "$asset_version" ]; then
            echo "Skipping AUR publish for tag without prerelease channel: ${TAG_NAME}"
            exit 0
          fi

          asset_name="pulsesync-app-${asset_version}-linux-x64.tar.gz"
          asset_url="https://s3.pulsesync.dev/builds/app/${branch}/${asset_name}"
          sha256="$(curl -fsSL "$asset_url" | sha256sum | awk '{print $1}')"

          export PKGVER="$pkgver"
          export BRANCH="$branch"
          export ASSET_NAME="$asset_name"
          export SHA256="$sha256"

          python3 - <<'PY'
          import os
          import pathlib
          import re

          root = pathlib.Path('packaging/aur')
          pkgbuild_path = root / 'PKGBUILD'
          pkgbuild = pkgbuild_path.read_text()

          current_pkgver_match = re.search(r'^pkgver=(.+)$', pkgbuild, re.MULTILINE)
          current_pkgrel_match = re.search(r'^pkgrel=(\d+)$', pkgbuild, re.MULTILINE)

          if not current_pkgver_match or not current_pkgrel_match:
              raise SystemExit('Failed to parse pkgver/pkgrel from packaging/aur/PKGBUILD')

          current_pkgver = current_pkgver_match.group(1).strip()
          current_pkgrel = int(current_pkgrel_match.group(1))
          next_pkgrel = 1 if current_pkgver != os.environ['PKGVER'] else current_pkgrel + 1

          replacements = {
              r'^pkgver=.+$': f"pkgver={os.environ['PKGVER']}",
              r'^pkgrel=.+$': f"pkgrel={next_pkgrel}",
              r'^_branch=.+$': f"_branch={os.environ['BRANCH']}",
              r'^_asset_version=.+$': f"_asset_version=\"{os.environ['PKGVER']}-{os.environ['BRANCH']}\"",
              r'^_asset=.+$': f"_asset=\"{os.environ['ASSET_NAME']}\"",
              r"^sha256sums_x86_64=\('.+'\)$": f"sha256sums_x86_64=('{os.environ['SHA256']}')",
          }

          for pattern, replacement in replacements.items():
              pkgbuild, count = re.subn(pattern, replacement, pkgbuild, count=1, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f'Failed to update pattern: {pattern}')

          pkgbuild_path.write_text(pkgbuild)
          print(f'Prepared PKGBUILD for {os.environ["PKGVER"]}-{next_pkgrel}')
          PY

      - name: Clone AUR repository
        shell: bash
        run: |
          export GIT_SSH_COMMAND="ssh -o BatchMode=yes -o IdentitiesOnly=yes -i \"$HOME/.ssh/aur_archlinux\""
          git clone ssh://aur@aur.archlinux.org/pulsesync-bin.git aur-repo

      - name: Generate .SRCINFO
        shell: bash
        run: |
          set -euo pipefail

          cp packaging/aur/PKGBUILD aur-repo/PKGBUILD
          cp packaging/aur/pulsesync-bin.install aur-repo/pulsesync-bin.install
          cp packaging/aur/pulsesync.desktop aur-repo/pulsesync.desktop
          cp packaging/aur/pulsesync.xml aur-repo/pulsesync.xml

          docker run --rm \
            -v "$PWD/aur-repo:/work:ro" \
            -w /work \
            archlinux:latest \
            bash -lc "pacman -Sy --noconfirm base-devel && useradd -m builder && su builder -c 'makepkg --printsrcinfo'" > aur-repo/.SRCINFO

      - name: Commit and push AUR update
        shell: bash
        run: |
          set -euo pipefail

          cd aur-repo
          export GIT_SSH_COMMAND="ssh -o BatchMode=yes -o IdentitiesOnly=yes -i \"$HOME/.ssh/aur_archlinux\""

          if [ -z "$(git status --porcelain -- PKGBUILD .SRCINFO pulsesync-bin.install pulsesync.desktop pulsesync.xml)" ]; then
            echo "No AUR changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pkgver="$(awk -F= '/^pkgver=/{print $2; exit}' PKGBUILD)"
          pkgrel="$(awk -F= '/^pkgrel=/{print $2; exit}' PKGBUILD)"

          git add PKGBUILD .SRCINFO pulsesync-bin.install pulsesync.desktop pulsesync.xml
          git commit -m "chore: update pulsesync-bin to ${pkgver}-${pkgrel}"
          git push origin master
